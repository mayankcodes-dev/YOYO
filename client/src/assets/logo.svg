<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!--
    YoYo — hand-crafted vector paths replicating OYO's rounded bold style
    Color: #E8003D | Viewbox: 260×80 | Optimised for 20–48px render heights
  -->

  <!-- ═══ Y (first) ═══════════════════════════════════════════════════ -->
  <!-- Left arm: thick diagonal going down-right to center junction -->
  <path d="
    M 4 8
    C 4 8, 8 8, 11 12
    L 30 40
    L 30 68
    C 30 72, 27 74, 23 74
    L 17 74
    C 13 74, 10 72, 10 68
    L 10 42
    L -2 16
    C -5 10, -1 8, 4 8
    Z
  " fill="#E8003D"/>
  <!-- Simplified Y using rectangles + transforms -->

  <!--
    APPROACH: Use a single <text> with embedded Nunito Black via base64 WOFF
    is complex. Instead, use precise bezier paths matching OYO letterforms.
    Below is a clean geometric construction.
  -->

  <!-- ── LETTER Y (pos: x=2) ─────────────────────────────── -->
  <g transform="translate(2, 4)">
    <!-- Left diagonal arm -->
    <rect x="0" y="0" width="18" height="44" rx="9"
          transform="rotate(22, 9, 0)"
          fill="#E8003D"/>
    <!-- Right diagonal arm -->
    <rect x="20" y="0" width="18" height="44" rx="9"
          transform="rotate(-22, 29, 0)"
          fill="#E8003D"/>
    <!-- Vertical stem -->
    <rect x="15.5" y="26" width="18" height="42" rx="9"
          fill="#E8003D"/>
  </g>

  <!-- ── LETTER o (lowercase, pos: x=74) ───────────────────── -->
  <g transform="translate(74, 22)">
    <circle cx="19" cy="19" r="23" fill="#E8003D"/>
    <circle cx="19" cy="19" r="10" fill="white"/>
  </g>

  <!-- ── LETTER Y (second, pos: x=128) ─────────────────────── -->
  <g transform="translate(130, 4)">
    <rect x="0" y="0" width="18" height="44" rx="9"
          transform="rotate(22, 9, 0)"
          fill="#E8003D"/>
    <rect x="20" y="0" width="18" height="44" rx="9"
          transform="rotate(-22, 29, 0)"
          fill="#E8003D"/>
    <rect x="15.5" y="26" width="18" height="42" rx="9"
          fill="#E8003D"/>
  </g>

  <!-- ── LETTER o (second, pos: x=202) ─────────────────────── -->
  <g transform="translate(202, 22)">
    <circle cx="19" cy="19" r="23" fill="#E8003D"/>
    <circle cx="19" cy="19" r="10" fill="white"/>
  </g>

</svg>
